name: CI Tools Verification

on:
  push:
    paths:
      - 'tools/ci/**'
  pull_request:
    paths:
      - 'tools/ci/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tools/ci/go.sum

      - name: Go Format
        run: go fmt ./...

      - name: Go Vet
        run: go vet ./...

      - name: Build Tools
        run: go build ./...

      - name: Run Tests
        run: go test -v ./...
