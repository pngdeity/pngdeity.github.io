name: Auto Rollback Bad Pages Deployment

on:
  workflow_run:
    workflows: ["Build and Deploy Website Content"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: Commit SHA to redeploy.
        required: true
        type: string
      bad_sha:
        description: Optional bad commit SHA for incident reporting context.
        required: false
        type: string

permissions:
  contents: read
  actions: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages-rollback
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  AUTO_ROLLBACK_ENABLED: ${{ vars.AUTO_ROLLBACK_ENABLED || 'true' }}
  DART_SASS_VERSION: 1.97.2
  DOTNET_VERSION: 10.0.x
  GO_VERSION: 1.25.5
  HUGO_VERSION: 0.154.4
  NODE_VERSION: 24.12.0
  PYTHON_VERSION: '3.12'

jobs:
  resolve_rollback_context:
    runs-on: ubuntu-latest
    outputs:
      should_rollback: ${{ steps.resolve.outputs.should_rollback }}
      incident_detected: ${{ steps.resolve.outputs.incident_detected }}
      reason: ${{ steps.resolve.outputs.reason }}
      bad_sha: ${{ steps.resolve.outputs.bad_sha }}
      bad_run_id: ${{ steps.resolve.outputs.bad_run_id }}
      bad_run_url: ${{ steps.resolve.outputs.bad_run_url }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      target_run_id: ${{ steps.resolve.outputs.target_run_id }}
      target_run_url: ${{ steps.resolve.outputs.target_run_url }}
    steps:
      - name: Resolve rollback target
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            const eventName = context.eventName;
            const autoRollbackEnabled = (process.env.AUTO_ROLLBACK_ENABLED || "true").toLowerCase() !== "false";

            const output = {
              should_rollback: "false",
              incident_detected: "false",
              reason: "",
              bad_sha: "",
              bad_run_id: "",
              bad_run_url: "",
              target_sha: "",
              target_run_id: "",
              target_run_url: ""
            };

            if (eventName === "workflow_dispatch") {
              const targetSha = core.getInput("rollback_sha");
              const badShaInput = core.getInput("bad_sha");
              output.should_rollback = "true";
              output.reason = "Manual rollback requested via workflow_dispatch.";
              output.target_sha = targetSha;
              output.bad_sha = badShaInput || "";
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            const run = context.payload.workflow_run;
            output.bad_sha = run.head_sha || "";
            output.bad_run_id = String(run.id || "");
            output.bad_run_url = run.html_url || "";

            if (!autoRollbackEnabled) {
              output.reason = "Auto rollback disabled by repository variable AUTO_ROLLBACK_ENABLED=false.";
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            if (run.conclusion !== "failure") {
              output.reason = `Triggering workflow conclusion '${run.conclusion}' is not eligible for rollback.`;
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            if (run.run_attempt > 1) {
              output.reason = `Skipping repeated attempt for incident run ${run.id} (run_attempt=${run.run_attempt}).`;
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
                per_page: 100
              }
            );

            const deployJob = jobs.find((job) => job.name === "merge_and_deploy");
            const postDeployHealthStep = deployJob?.steps?.find((step) => step.name === "Post-deploy Health Verification");

            if (!postDeployHealthStep || postDeployHealthStep.conclusion !== "failure") {
              output.reason = "Deployment did not fail due to post-deploy health verification; no auto rollback.";
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            output.incident_detected = "true";

            const successfulRuns = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: run.workflow_id,
                branch: "main",
                status: "completed",
                per_page: 100
              }
            );

            const badRunCreatedAt = new Date(run.created_at);
            const priorGoodRun = successfulRuns.find((candidate) =>
              candidate.conclusion === "success" &&
              candidate.head_sha &&
              candidate.head_sha !== run.head_sha &&
              new Date(candidate.created_at) < badRunCreatedAt
            );

            if (!priorGoodRun) {
              output.reason = "No prior known-good successful deployment run found.";
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            if (priorGoodRun.head_sha === run.head_sha) {
              output.reason = "Resolved rollback target equals failing commit; skipping to prevent rollback loop.";
              for (const [k, v] of Object.entries(output)) core.setOutput(k, v);
              return;
            }

            output.should_rollback = "true";
            output.reason = `Auto rollback target resolved from run ${priorGoodRun.id}.`;
            output.target_sha = priorGoodRun.head_sha;
            output.target_run_id = String(priorGoodRun.id);
            output.target_run_url = priorGoodRun.html_url || "";
            for (const [k, v] of Object.entries(output)) core.setOutput(k, v);

      - name: Write rollback decision summary
        run: |
          {
            echo "## Auto Rollback Decision"
            echo "- Should rollback: \`${{ steps.resolve.outputs.should_rollback }}\`"
            echo "- Incident detected: \`${{ steps.resolve.outputs.incident_detected }}\`"
            echo "- Reason: ${{ steps.resolve.outputs.reason }}"
            echo "- Bad commit: \`${{ steps.resolve.outputs.bad_sha || 'n/a' }}\`"
            echo "- Bad run: ${{ steps.resolve.outputs.bad_run_url || 'n/a' }}"
            echo "- Target commit: \`${{ steps.resolve.outputs.target_sha || 'n/a' }}\`"
            echo "- Target run: ${{ steps.resolve.outputs.target_run_url || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

  create_or_update_incident:
    runs-on: ubuntu-latest
    needs: [resolve_rollback_context]
    if: needs.resolve_rollback_context.outputs.incident_detected == 'true'
    steps:
      - name: Create or update rollback incident issue
        uses: actions/github-script@v8
        with:
          script: |
            const badRunId = `${{ needs.resolve_rollback_context.outputs.bad_run_id }}`;
            const badRunUrl = `${{ needs.resolve_rollback_context.outputs.bad_run_url }}`;
            const badSha = `${{ needs.resolve_rollback_context.outputs.bad_sha }}`;
            const targetSha = `${{ needs.resolve_rollback_context.outputs.target_sha }}`;
            const targetRunUrl = `${{ needs.resolve_rollback_context.outputs.target_run_url }}`;
            const reason = `${{ needs.resolve_rollback_context.outputs.reason }}`;

            const title = `[auto-rollback] Failed deployment incident run #${badRunId}`;
            const body = [
              "A deployment to GitHub Pages failed post-deploy health verification.",
              "",
              `- Bad run: ${badRunUrl}`,
              `- Bad commit: \`${badSha || "n/a"}\``,
              `- Rollback target commit: \`${targetSha || "n/a"}\``,
              `- Rollback source run: ${targetRunUrl || "n/a"}`,
              `- Decision: ${reason}`
            ].join("\n");

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "all",
                per_page: 100
              }
            );

            const existing = issues.find((issue) => issue.title === title);

            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["auto-rollback"]
              });
              core.summary.addRaw(`Created incident issue: ${title}`).write();
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: "open"
            });

            core.summary.addRaw(`Updated incident issue: ${existing.html_url}`).write();

  build_hugo:
    runs-on: ubuntu-latest
    needs: [resolve_rollback_context]
    if: needs.resolve_rollback_context.outputs.should_rollback == 'true'
    steps:
      - name: Checkout rollback target
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_rollback_context.outputs.target_sha }}
          submodules: recursive
          fetch-depth: 0

      - name: Restore Hugo Build Cache
        id: cache-hugo
        uses: actions/cache@v4
        with:
          path: hugo-src/public
          key: hugo-site-${{ runner.os }}-${{ hashFiles('hugo-src/**') }}

      - name: Setup Node.js
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Hugo
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Install Dart Sass
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          curl -sLJO "https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          tar -xf "dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz"
          echo "$PWD/dart-sass" >> $GITHUB_PATH

      - name: Install Node.js dependencies
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Build Hugo
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          hugo \
            --gc \
            --minify \
            --source ./hugo-src

      - name: Upload Hugo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hugo-site
          path: hugo-src/public

  build_blazor:
    runs-on: ubuntu-latest
    needs: [resolve_rollback_context]
    if: needs.resolve_rollback_context.outputs.should_rollback == 'true'
    steps:
      - name: Checkout rollback target
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_rollback_context.outputs.target_sha }}
          submodules: recursive

      - name: Restore Blazor Build Cache
        id: cache-blazor
        uses: actions/cache@v4
        with:
          path: release/wwwroot
          key: blazor-app-${{ runner.os }}-${{ hashFiles('my-blazor-app/**') }}

      - name: Setup .NET
        if: steps.cache-blazor.outputs.cache-hit != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Blazor App
        if: steps.cache-blazor.outputs.cache-hit != 'true'
        run: |
          dotnet publish my-blazor-app/BlazorApp.csproj -c Release -o release
          sed -i 's|<base href="/" />|<base href="/app/" />|g' release/wwwroot/index.html

      - name: Upload Blazor Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazor-site
          path: release/wwwroot

  merge_and_deploy:
    runs-on: ubuntu-latest
    needs: [resolve_rollback_context, build_hugo, build_blazor]
    if: needs.resolve_rollback_context.outputs.should_rollback == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout rollback target
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve_rollback_context.outputs.target_sha }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Download Hugo Artifact
        uses: actions/download-artifact@v4
        with:
          name: hugo-site
          path: src/blog

      - name: Download Blazor Artifact
        uses: actions/download-artifact@v4
        with:
          name: blazor-site
          path: src/app

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate Site Metadata
        run: python3 scripts/generate-site-metadata.py

      - name: Validate Site Metadata
        run: python3 scripts/validate-site-metadata.py

      - name: Create .nojekyll
        run: touch src/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './src'

      - name: Deploy to GitHub Pages (Rollback)
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post-rollback Health Verification
        id: post_rollback_health
        continue-on-error: true
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -uo pipefail
          mkdir -p health-check
          log_file="health-check/post-rollback-health-check.log"
          : > "$log_file"

          if [[ -z "${PAGE_URL:-}" ]]; then
            echo "Rollback deployment URL is empty." | tee -a "$log_file"
            exit 1
          fi

          base_url="${PAGE_URL%/}"
          endpoints=(
            "/"
            "/blog/"
            "/app/"
            "/sitemap.xml"
            "/robots.txt"
          )
          failures=()

          echo "Waiting for GitHub Pages propagation..." | tee -a "$log_file"
          sleep 20

          for endpoint in "${endpoints[@]}"; do
            url="${base_url}${endpoint}"
            body_file="health-check/body$(echo "$endpoint" | tr '/.' '__').txt"
            status="$(curl -sS -L -o "$body_file" -w "%{http_code}" "$url" || true)"
            if [[ "$status" != "200" ]]; then
              failures+=("${endpoint} => HTTP ${status}")
              echo "FAIL ${endpoint}: HTTP ${status}" | tee -a "$log_file"
            else
              echo "PASS ${endpoint}: HTTP ${status}" | tee -a "$log_file"
            fi
          done

          {
            echo "## Post-rollback Health Verification"
            echo "Base URL: ${base_url}"
            if [[ "${#failures[@]}" -eq 0 ]]; then
              echo ""
              echo "- ✅ All deterministic checks passed."
            else
              echo ""
              echo "- ❌ One or more checks failed:"
              for failure in "${failures[@]}"; do
                echo "  - ${failure}"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${#failures[@]}" -ne 0 ]]; then
            printf '%s\n' "${failures[@]}" > health-check/failures.txt
            exit 1
          fi

      - name: Upload Post-rollback Health Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-rollback-health-${{ github.run_id }}
          path: health-check

      - name: Fail rollback if health verification fails
        if: steps.post_rollback_health.outcome != 'success'
        run: |
          echo "Rollback deployment health verification failed." >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Write rollback completion summary
        run: |
          {
            echo "## Auto Rollback Result"
            echo "- Bad commit: \`${{ needs.resolve_rollback_context.outputs.bad_sha || 'n/a' }}\`"
            echo "- Rolled back to commit: \`${{ needs.resolve_rollback_context.outputs.target_sha }}\`"
            echo "- Bad deployment run: ${{ needs.resolve_rollback_context.outputs.bad_run_url || 'n/a' }}"
            echo "- Target successful run: ${{ needs.resolve_rollback_context.outputs.target_run_url || 'manual' }}"
          } >> "$GITHUB_STEP_SUMMARY"
