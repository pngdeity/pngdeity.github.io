name: Generic Build and Deploy Framework
description: 'Delegates build execution to the repository CI scripts and deploys the resulting artifact.'

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build_application:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Just
        uses: extractions/setup-just@v4

      # Hand over control to the repository's custom code
      - name: Execute Build Contract
        run: just ci

      # Blindly collect the standardized output directory
      - name: Upload Standardized Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deployment-payload
          path: ./ci/out/

  deploy:
    runs-on: ubuntu-latest
    needs: build_application
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Download Deployment Payload
        uses: actions/download-artifact@v8
        with:
          name: deployment-payload
          path: ./src

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
